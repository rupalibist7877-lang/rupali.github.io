<div class="container">
<div class="row">
<div class="col-md-11">

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 2; padding: 0; }
  :root {
    --accent: #bb0000;
    --accent-dark: #880000;
    --text: #0a0a0a;
    --muted: #333333;
    --subtle: #555555;
    --border: #cccccc;
    --bg: #ffffff;
    --surface: #f4f4f4;
    --red-tint: rgba(187,0,0,0.07);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

  .wizard { width: 100%; height: 100%; display: flex; flex-direction: column; }

  /* Progress */
  .progress-bar { display: flex; gap: 5px; padding: 18px 24px 0; }
  .progress-bar span { flex: 1; height: 4px; border-radius: 99px; background: #ddd; transition: background 0.4s; }
  .progress-bar span.active { background: var(--accent); }
  .progress-bar span.done { background: var(--accent-dark); }

  .step-label { padding: 8px 24px 0; font-size: 24px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--subtle); font-weight: 700; }

  /* Slider */
  .track-wrapper { flex: 1; overflow: hidden; }
  .track { display: flex; height: 100%; transition: transform 0.55s cubic-bezier(0.77,0,0.175,1); }
  .slide { min-width: 100%; height: 100%; padding: 16px 24px 20px; display: flex; flex-direction: column; overflow-y: auto; }
  .slide::-webkit-scrollbar { width: 4px; }
  .slide::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

  /* ── STEP 1: CALENDAR ── */
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cal-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 0.06em; color: var(--text); }
  .cal-nav { display: flex; gap: 6px; }
  .cal-nav button {
    width: 40px; height: 40px; border-radius: 8px;
    border: 2px solid var(--border); background: #fff; color: var(--text);
    cursor: pointer; font-size: 22px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .cal-nav button:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; }
  .cal-day-name { text-align: center; font-size: 14px; font-weight: 700; letter-spacing: 0.08em; color: var(--muted); padding: 4px 0 8px; text-transform: uppercase; }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    border-radius: 7px; font-size: 18px; font-weight: 700; color: var(--text);
    cursor: pointer; border: 2px solid transparent; transition: all 0.18s; background: var(--surface);
  }
  .cal-day.empty { background: transparent; cursor: default; }
  .cal-day.past { color: #bbb; cursor: not-allowed; background: transparent; font-weight: 500; }
  .cal-day:not(.empty):not(.past):hover { border-color: var(--accent); color: var(--accent); background: var(--red-tint); }
  .cal-day.selected { background: var(--accent); color: #fff; border-color: var(--accent); }
  .cal-day.today:not(.selected) { border-color: var(--accent-dark); }

  .time-label { margin: 18px 0 10px; font-size: 14px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .time-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 10px; }
  .time-slot {
    padding: 12px 6px; text-align: center; border-radius: 7px;
    border: 2px solid var(--border); background: var(--surface);
    font-size: 15px; font-weight: 700; cursor: pointer; color: var(--text); transition: all 0.18s;
  }
  .time-slot:hover { border-color: var(--accent); color: var(--accent); background: var(--red-tint); }
  .time-slot.selected { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Next btn */
  .next-btn { margin-top: auto; padding-top: 12px; display: flex; justify-content: flex-end; }
  .next-btn button {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 36px; background: var(--accent); border: none; border-radius: 10px;
    color: #fff; font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em;
  }
  .next-btn button:hover { background: var(--accent-dark); transform: translateX(3px); }
  .next-btn button svg { transition: transform 0.2s; width: 20px; height: 20px; }
  .next-btn button:hover svg { transform: translateX(4px); }

  /* Slide headings */
  .slide h3 { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 0.05em; color: var(--text); margin-bottom: 4px; }
  .slide .sub { font-size: 16px; color: var(--subtle); margin-bottom: 18px; font-weight: 600; }

  /* ── VEHICLE ── */
  .vehicle-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin-bottom: 10px; }
  .vehicle-card {
    background: var(--surface); border: 2px solid var(--border); border-radius: 12px;
    padding: 20px 14px 16px; cursor: pointer; transition: all 0.22s;
    display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center;
  }
  .vehicle-card:hover { border-color: var(--accent); background: var(--red-tint); }
  .vehicle-card.selected { border-color: var(--accent); background: var(--red-tint); }
  .vehicle-card .icon { font-size: 40px; line-height: 1; }
  .vehicle-card .v-name { font-weight: 700; font-size: 18px; color: var(--text); }
  .vehicle-card .v-desc { font-size: 14px; color: var(--subtle); font-weight: 600; }

  /* ── SERVICES ── */
  .service-category { margin-bottom: 20px; }
  .cat-label {
    font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .cat-label::after { content: ''; flex: 1; height: 2px; background: #e0e0e0; }
  .service-pills { display: flex; flex-wrap: wrap; gap: 9px; }
  .pill {
    padding: 10px 18px; border-radius: 999px; border: 2px solid var(--border);
    background: var(--surface); font-size: 16px; font-weight: 700; cursor: pointer;
    transition: all 0.18s; display: flex; align-items: center; gap: 8px; color: var(--text);
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pill .picon { font-size: 18px; }

  /* ── CONTACT ── */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .form-group label { font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .form-group input, .form-group textarea {
    background: var(--surface); border: 2px solid var(--border); border-radius: 9px;
    padding: 14px 16px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 16px; font-weight: 600; outline: none; transition: border-color 0.2s;
  }
  .form-group input::placeholder, .form-group textarea::placeholder { color: #aaa; }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 90px; }

  .summary-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip { padding: 6px 16px; border-radius: 999px; background: var(--red-tint); border: 2px solid rgba(187,0,0,0.25); font-size: 14px; font-weight: 700; color: var(--accent); }

  .submit-btn {
    width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 10px;
    color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.1em;
    cursor: pointer; transition: all 0.22s; margin-top: 6px;
  }
  .submit-btn:hover { background: var(--accent-dark); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(187,0,0,0.3); }

  /* SUCCESS */
  .success-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; text-align: center; padding: 32px; }
  .success-screen .check { font-size: 70px; }
  .success-screen h2 { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 0.05em; color: var(--accent); }
  .success-screen p { color: var(--muted); font-size: 18px; line-height: 1.65; font-weight: 600; }
</style>
</head>
<body>
<div class="wizard">
  <div class="progress-bar" id="progressBar"><span></span><span></span><span></span><span></span></div>
  <div class="step-label" id="stepLabel">Step 1 of 4 — Select Date & Time</div>
  <div class="track-wrapper">
    <div class="track" id="track">

      <div class="slide">
        <div class="cal-header">
          <h2 id="calMonthYear">June 2026</h2>
          <div class="cal-nav">
            <button onclick="changeMonth(-1)">&#8249;</button>
            <button onclick="changeMonth(1)">&#8250;</button>
          </div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="time-label">Available Time Slots</div>
        <div class="time-grid" id="timeGrid"></div>
        <div class="next-btn">
          <button onclick="goTo(1)">Next <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
        </div>
      </div>

      <div class="slide">
        <h3>Select Your Vehicle</h3>
        <p class="sub">What type of car are you bringing in?</p>
        <div class="vehicle-grid" id="vehicleGrid"></div>
        <div class="next-btn">
          <button onclick="goTo(2)">Next <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
        </div>
      </div>

      <div class="slide">
        <h3>Select Services</h3>
        <p class="sub">Pick one or more — we'll handle the rest.</p>
        <div id="servicesContainer"></div>
        <div class="next-btn">
          <button onclick="goTo(3)">Next <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
        </div>
      </div>

      <div class="slide">
        <h3>Your Details</h3>
        <p class="sub">Almost done — tell us how to reach you.</p>
        <div class="summary-bar" id="summaryBar"></div>
        <div class="form-row">
          <div class="form-group"><label>First Name *</label><input type="text" id="fname" placeholder="John"></div>
          <div class="form-group"><label>Last Name *</label><input type="text" id="lname" placeholder="Doe"></div>
        </div>
        <div class="form-group"><label>Phone Number *</label><input type="tel" id="phone" placeholder="+91 98765 43210"></div>
        <div class="form-group"><label>Email Address *</label><input type="email" id="email" placeholder="john@email.com"></div>
        <div class="form-group"><label>Comments / Special Requests</label><textarea id="comments" placeholder="Any info about your vehicle or issue…"></textarea></div>
        <button class="submit-btn" onclick="submitForm()">CONFIRM BOOKING →</button>
      </div>

    </div>
  </div>
</div>

<script>
  let currentStep=0,selectedDate=null,selectedTime=null,selectedVehicle=null,selectedServices=[];
  const DAYS=['Su','Mo','Tu','We','Th','Fr','Sa'];
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  let calDate=new Date(2026,5,1);

  function renderCalendar(){
    const now=new Date(); now.setHours(0,0,0,0);
    const y=calDate.getFullYear(),m=calDate.getMonth();
    document.getElementById('calMonthYear').textContent=`${MONTHS[m]} ${y}`;
    const first=new Date(y,m,1).getDay(), total=new Date(y,m+1,0).getDate();
    let h=DAYS.map(d=>`<div class="cal-day-name">${d}</div>`).join('');
    for(let i=0;i<first;i++) h+=`<div class="cal-day empty"></div>`;
    for(let d=1;d<=total;d++){
      const dt=new Date(y,m,d), isPast=dt<now, isToday=dt.getTime()===now.getTime();
      const isSel=selectedDate&&selectedDate.getTime()===dt.getTime();
      const cls=['cal-day',isPast?'past':'',isToday?'today':'',isSel?'selected':''].filter(Boolean).join(' ');
      h+=`<div class="${cls}"${isPast?'':` onclick="selectDate(${y},${m},${d})"`}>${d}</div>`;
    }
    document.getElementById('calGrid').innerHTML=h;
  }
  function changeMonth(d){ calDate.setMonth(calDate.getMonth()+d); renderCalendar(); }
  function selectDate(y,m,d){ selectedDate=new Date(y,m,d); renderCalendar(); renderTimeSlots(); }

  const SLOTS=['10:00 AM','10:30 AM','11:00 AM','11:30 AM','12:00 PM','12:30 PM','01:00 PM','01:30 PM','02:00 PM','02:30 PM','03:00 PM','03:30 PM','04:00 PM','04:30 PM','05:00 PM','05:30 PM'];
  function renderTimeSlots(){
    document.getElementById('timeGrid').innerHTML=SLOTS.map(t=>`<div class="time-slot${selectedTime===t?' selected':''}" onclick="selectTime('${t}')">${t}</div>`).join('');
  }
  function selectTime(t){ selectedTime=t; renderTimeSlots(); }

  const VEHICLES=[
    {id:'suv',icon:'🚙',name:'SUV',desc:'Compact to full-size'},
    {id:'sedan',icon:'🚗',name:'Sedan',desc:'4-door standard cars'},
    {id:'hatchback',icon:'🚘',name:'Hatchback',desc:'3 or 5-door'},
    {id:'electric',icon:'⚡',name:'Electric / EV',desc:'Battery electric'},
    {id:'hybrid',icon:'🌿',name:'Hybrid',desc:'Petrol-electric'},
    {id:'luxury',icon:'🏎️',name:'Luxury',desc:'Premium & sports'},
    {id:'van',icon:'🚐',name:'Van / MUV',desc:'Multi-utility'},
    {id:'truck',icon:'🛻',name:'Pickup / Truck',desc:'Light commercial'},
  ];
  function renderVehicles(){
    document.getElementById('vehicleGrid').innerHTML=VEHICLES.map(v=>`
      <div class="vehicle-card${selectedVehicle===v.id?' selected':''}" onclick="selectVehicle('${v.id}')">
        <div class="icon">${v.icon}</div><div class="v-name">${v.name}</div><div class="v-desc">${v.desc}</div>
      </div>`).join('');
  }
  function selectVehicle(id){ selectedVehicle=id; renderVehicles(); }

  const SCATS=[
    {cat:'Routine Maintenance',items:[{id:'service',icon:'🔧',name:'Full Car Service'},{id:'oil',icon:'🛢️',name:'Oil & Filter Change'},{id:'brakes',icon:'🛑',name:'Brake Inspection'},{id:'battery',icon:'🔋',name:'Battery Check'}]},
    {cat:'Comfort & Climate',items:[{id:'ac',icon:'❄️',name:'AC Repair & Gas Refill'},{id:'heater',icon:'🌡️',name:'Heater / Blower Fix'}]},
    {cat:'Engine & Transmission',items:[{id:'engine',icon:'⚙️',name:'Engine Diagnosis'},{id:'transmission',icon:'🔩',name:'Transmission Service'},{id:'exhaust',icon:'💨',name:'Exhaust System'}]},
    {cat:'Tyres & Wheels',items:[{id:'tires',icon:'🔄',name:'Tyre Change / Rotation'},{id:'alignment',icon:'📐',name:'Wheel Alignment'},{id:'balancing',icon:'⚖️',name:'Wheel Balancing'},{id:'puncture',icon:'🩹',name:'Puncture Repair'}]},
    {cat:'Bodywork & Detailing',items:[{id:'wash',icon:'🚿',name:'Full Car Wash'},{id:'polish',icon:'✨',name:'Polish & Wax'},{id:'dent',icon:'🔨',name:'Dent Removal'},{id:'paint',icon:'🎨',name:'Paint Touch-Up'}]},
  ];
  function renderServices(){
    document.getElementById('servicesContainer').innerHTML=SCATS.map(c=>`
      <div class="service-category">
        <div class="cat-label">${c.cat}</div>
        <div class="service-pills">${c.items.map(s=>`<div class="pill${selectedServices.includes(s.id)?' selected':''}" onclick="toggleService('${s.id}')"><span class="picon">${s.icon}</span>${s.name}</div>`).join('')}</div>
      </div>`).join('');
  }
  function toggleService(id){
    selectedServices.includes(id)?selectedServices=selectedServices.filter(s=>s!==id):selectedServices.push(id);
    renderServices();
  }

  function goTo(step){
    if(step===1&&(!selectedDate||!selectedTime)){alert('Please select a date and a time slot.');return;}
    if(step===2&&!selectedVehicle){alert('Please select your vehicle type.');return;}
    if(step===3&&selectedServices.length===0){alert('Please select at least one service.');return;}
    if(step===3) renderSummary();
    currentStep=step;
    document.getElementById('track').style.transform=`translateX(-${step*100}%)`;
    const bars=document.querySelectorAll('.progress-bar span');
    const labels=['Select Date & Time','Choose Your Vehicle','Pick Services','Your Details'];
    bars.forEach((b,i)=>{ b.classList.remove('active','done'); if(i===step) b.classList.add('active'); else if(i<step) b.classList.add('done'); });
    document.getElementById('stepLabel').textContent=`Step ${step+1} of 4 — ${labels[step]}`;
  }
  function renderSummary(){
    const vn=VEHICLES.find(v=>v.id===selectedVehicle)?.name||'';
    const ds=selectedDate?selectedDate.toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric'}):'';
    document.getElementById('summaryBar').innerHTML=[
      ds&&`<span class="chip">📅 ${ds}</span>`,
      selectedTime&&`<span class="chip">🕐 ${selectedTime}</span>`,
      vn&&`<span class="chip">🚗 ${vn}</span>`,
      selectedServices.length>0&&`<span class="chip">🔧 ${selectedServices.length} service(s)</span>`,
    ].filter(Boolean).join('');
  }
  function submitForm(){
    const fname=document.getElementById('fname').value.trim();
    const lname=document.getElementById('lname').value.trim();
    const phone=document.getElementById('phone').value.trim();
    const email=document.getElementById('email').value.trim();
    const comments=document.getElementById('comments').value.trim();
    if(!fname||!lname||!phone||!email){alert('Please fill in all required fields.');return;}
    const vn=VEHICLES.find(v=>v.id===selectedVehicle)?.name||'';
    const ds=selectedDate?selectedDate.toLocaleDateString('en-IN',{weekday:'long',month:'long',day:'numeric',year:'numeric'}):'';
    const sNames=selectedServices.map(sid=>{for(const c of SCATS){const f=c.items.find(i=>i.id===sid);if(f)return f.name;}return sid;});
    const body=`New Car Service Appointment\n\nName: ${fname} ${lname}\nPhone: ${phone}\nEmail: ${email}\n\nDate: ${ds}\nTime: ${selectedTime}\nVehicle: ${vn}\nServices: ${sNames.join(', ')}\n\nComments: ${comments||'None'}\n\n---\nSubmitted via AutoElite Booking Form`;
    window.open(`mailto:rupalibistchatri7878@gmail.com?subject=New Booking - ${fname} ${lname}&body=${encodeURIComponent(body)}`);
    document.querySelector('.wizard').innerHTML=`<div class="success-screen"><div class="check">✅</div><h2>Booking Confirmed!</h2><p>Thank you, <strong>${fname}</strong>!<br>Your request has been submitted.<br>We'll confirm your slot shortly.</p></div>`;
  }

  renderCalendar(); renderTimeSlots(); renderVehicles(); renderServices();
  document.querySelector('.progress-bar span').classList.add('active');
</script>
</body>
</html>
</div>
</div>
